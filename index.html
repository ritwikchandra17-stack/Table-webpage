<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Multiplication Table Generator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Comic Sans MS', cursive, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:90%;
    max-width:600px;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    color:#ff6b6b;
    margin-bottom:15px;
    font-size:2.2rem;
}

.subtitle{
    color:#555;
    margin-bottom:25px;
    font-size:1.1rem;
}

.input-box{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
}

input{
    width:180px;
    padding:15px;
    border:3px solid #ffd93d;
    border-radius:15px;
    font-size:20px;
    text-align:center;
    outline:none;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:15px;
    background:#ff6b6b;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff4757;
    transform:scale(1.05);
}

.table-box{
    margin-top:25px;
}

.table-row{
    background:#f1f9ff;
    margin:8px 0;
    padding:12px;
    border-radius:12px;
    font-size:22px;
    color:#333;
    font-weight:bold;
    animation:fadeIn 0.3s ease;
}

.table-row:nth-child(even){
    background:#fff3cd;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:18px;
}
</style>
</head>
<body>

<div class="container">
    <h1>🌟 Learn Tables 🌟</h1>
    <p class="subtitle">Enter a number and let's learn multiplication! 🎉</p>

    <div class="input-box">
        <input type="number" id="numberInput" placeholder="Enter Number">
        <button onclick="generateTable()">Generate Table 🚀</button>
    </div>

    <div class="table-box" id="tableBox"></div>

    <div class="footer">
        📚 Practice Every Day & Become a Math Star! ⭐
    </div>
</div>

<script>
function generateTable() {
    let number = document.getElementById("numberInput").value;
    let tableBox = document.getElementById("tableBox");

    if(number === ""){
        tableBox.innerHTML =
        "<div class='table-row'>⚠️ Please enter a number!</div>";
        return;
    }

    let output = "";

    for(let i = 1; i <= 10; i++){
        output += `
        <div class="table-row">
            ${number} × ${i} = ${number * i}
        </div>`;
    }

    tableBox.innerHTML = output;
}
</script>

</body>
</html>
